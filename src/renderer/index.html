<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Suite Workstation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ÉCRAN DE DÉMARRAGE (Splash Screen) -->
    <div id="splash-screen">
        <div class="loader-container">
            <img src="/assets/icons/K-Suite.svg" alt="Logo K-Suite" id="splash-logo">
            <div class="spinner"></div>
            <p id="loader-text">Initialisation de votre espace K-Suite...</p>
        </div>
    </div>

    <!-- CONTENEUR PRINCIPAL -->
    <div id="app-container" class="hidden">
        
        <header class="toolbar">
            <div class="branding">
                <img src="../../assets/icons/K-Suite.svg" alt="K-Suite" class="app-icon-svg">
                <span>K-Suite</span>
            </div>
            
            <div class="search-bar">
                <input type="text" id="url-input" placeholder="Lien kDrive ou recherche Infomaniak...">
                <button id="search-btn">
                    <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                </button>
            </div>
            
            <div class="window-controls">
                <button id="btn-view-1" class="view-btn active" title="1 Volet">
                    <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M19 5v14H5V5h14m0-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
                </button>
                <button id="btn-view-2" class="view-btn" title="2 Volets">
                    <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M19 5v14h-7V5h7m0-2h-7c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h7c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 0H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h5V3z"/></svg>
                </button>
                <button id="btn-view-4" class="view-btn" title="4 Volets">
                    <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M3 3h8v8H3V3m10 0h8v8h-8V3M3 13h8v8H3v-8m10 0h8v8h-8v-8z"/></svg>
                </button>
            </div>
        </header>

        <!-- ZONE DES VOLETS -->
        <main id="views-container" class="grid-1">
            <div class="view-placeholder" id="placeholder-1"></div>
            <div class="view-placeholder" id="placeholder-2"></div>
            <div class="view-placeholder" id="placeholder-3"></div>
            <div class="view-placeholder" id="placeholder-4"></div>
        </main>

        <!-- MODALE DES PARAMÈTRES -->
        <div id="settings-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Configuration K-Suite</h2>
                    <button id="close-settings" class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="setting-item">
                        <label for="check-autostart">Démarrer avec Windows</label>
                        <input type="checkbox" id="check-autostart">
                    </div>
                    <div class="setting-item">
                        <label for="check-background">Actif en arrière-plan</label>
                        <input type="checkbox" id="check-background">
                    </div>
                    <div class="setting-item">
                        <label for="select-theme">Thème visuel</label>
                        <select id="select-theme">
                            <option value="system">Système</option>
                            <option value="light">Clair</option>
                            <option value="dark">Sombre</option>
                        </select>
                    </div>
                    <div class="setting-item column">
                        <label>Dossier de téléchargement</label>
                        <div class="path-selector">
                            <input type="text" id="input-download-path" readonly>
                            <button id="btn-browse-path">Modifier</button>
                        </div>
                    </div>
                    <div class="credits">
                        <p>K-Suite v2.1.1 par Loatrix</p>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="renderer.js"></script>
</body>
</html>
