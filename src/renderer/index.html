<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Suite Workstation</title>
    <link rel="stylesheet" href="./src/renderer/styles.css">

</head>
<body>

    <!-- ÉCRAN DE DÉMARRAGE -->
    <div id="splash-screen">
        <div class="loader-container">
            <img src="../../assets/icons/K-Suite.svg" alt="Logo K-Suite" id="splash-logo" onerror="this.style.display='none'">
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
            <p id="loader-text" style="color: #666;">Initialisation de votre espace K-Suite...</p>
        </div>
    </div>

    <div id="app-container" class="loading-transition">
        <!-- BARRE DE NAVIGATION -->
        <nav class="toolbar">
            <div class="branding">
                <img src="/assets/icons/K-Suite.svg" class="app-icon-svg" alt="K">
                <span>K-Suite</span>
            </div>

            <div class="search-container">
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="Rechercher ou saisir une URL Infomaniak...">
                    <button id="search-btn" class="icon-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </button>
                </div>
            </div>

            <div class="nav-actions">
                <button id="btn-switch-manager">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"></path></svg>
                    Switch to Manager
                </button>
                
                <button id="btn-view-1" class="icon-btn active" title="Vue Simple">1</button>
                <button id="btn-view-2" class="icon-btn" title="Vue Double">2</button>
                <button id="btn-view-4" class="icon-btn" title="Vue Quadrillée">4</button>
                
                <button id="btn-settings" class="icon-btn" title="Paramètres">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
            </div>
        </nav>

        <!-- ZONE D'AFFICHAGE DYNAMIQUE -->
        <div id="views-container" class="grid-1">
            <!-- Les webviews seront injectées ici par le JS -->
        </div>
    </div>

    <!-- MODALE PARAMÈTRES -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Paramètres K-Suite</h2>
                <button id="close-settings" class="icon-btn">✕</button>
            </div>
            <div class="modal-body">
                <div class="setting-row">
                    <label>Dossier de téléchargement par défaut</label>
                    <div class="path-input-group">
                        <input type="text" id="download-path" readonly placeholder="C:\Users\...">
                        <button id="btn-browse-path" class="btn-secondary">Parcourir</button>
                    </div>
                </div>
                <div class="setting-row" style="flex-direction: row; justify-content: space-between; align-items: center;">
                    <label>Mode Sombre</label>
                    <input type="checkbox" id="dark-mode-toggle">
                </div>
                <div class="setting-row" style="margin-top: 30px;">
                    <button id="btn-save-settings" style="width:100%; padding:12px; background:var(--primary-color); color:white; border:none; border-radius:6px; cursor:pointer;">Enregistrer les modifications</button>
                </div>
            </div>
        </div>
    </div>

    <script src="./renderer.js"></script>
</body>
</html>
